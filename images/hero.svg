<svg
          class="about-visual-inner"
          viewBox="0 0 300 360"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Brushless motor cross-section -->
          <rect
            x="50"
            y="80"
            width="200"
            height="200"
            rx="100"
            fill="rgba(10,186,181,0.08)"
            stroke="rgba(10,186,181,0.3)"
            stroke-width="1.5"
          />
          <rect
            x="80"
            y="110"
            width="140"
            height="140"
            rx="70"
            fill="rgba(10,186,181,0.1)"
            stroke="rgba(10,186,181,0.4)"
            stroke-width="1"
          />
          <circle
            cx="150"
            cy="180"
            r="40"
            fill="rgba(10,186,181,0.15)"
            stroke="rgba(10,186,181,0.6)"
            stroke-width="1.5"
          />
          <circle cx="150" cy="180" r="20" fill="rgba(10,186,181,0.3)" />
          <circle cx="150" cy="180" r="8" fill="rgba(10,186,181,0.8)" />
          <!-- Stator coils -->
          <rect
            x="128"
            y="70"
            width="14"
            height="30"
            rx="3"
            fill="rgba(10,186,181,0.5)"
          />
          <rect
            x="186"
            y="106"
            width="30"
            height="14"
            rx="3"
            fill="rgba(10,186,181,0.5)"
            transform="rotate(60 186 106)"
          />
          <rect
            x="196"
            y="166"
            width="30"
            height="14"
            rx="3"
            fill="rgba(10,186,181,0.5)"
            transform="rotate(120 196 166)"
          />
          <rect
            x="158"
            y="260"
            width="14"
            height="30"
            rx="3"
            fill="rgba(10,186,181,0.5)"
            transform="rotate(180 158 260)"
          />
          <rect
            x="100"
            y="240"
            width="30"
            height="14"
            rx="3"
            fill="rgba(10,186,181,0.5)"
            transform="rotate(240 100 240)"
          />
          <rect
            x="84"
            y="174"
            width="30"
            height="14"
            rx="3"
            fill="rgba(10,186,181,0.5)"
            transform="rotate(300 84 174)"
          />
          <!-- Shaft -->
          <rect
            x="144"
            y="20"
            width="12"
            height="60"
            rx="4"
            fill="rgba(10,186,181,0.6)"
          />
          <rect
            x="144"
            y="280"
            width="12"
            height="60"
            rx="4"
            fill="rgba(10,186,181,0.4)"
          />
          <!-- Labels -->
          <text
            x="150"
            y="330"
            text-anchor="middle"
            font-family="'DM Mono', monospace"
            font-size="10"
            fill="rgba(10,186,181,0.8)"
            letter-spacing="2"
          >
            BRUSHLESS MOTOR
          </text>
        </svg>